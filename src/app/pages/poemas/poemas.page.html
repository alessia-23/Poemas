<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Mis Poemas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="poemas-content">
  <div class="header-decor">
    <h2>Colección Lírica</h2>
    <p>Gestiona, inspira y edita tus obras literarias.</p>
  </div>

  <div class="cards-grid">
    @for (poema of listaPoemas; track poema.id) {
    <div class="poema-card">
      <div class="card-body">
        <span class="poema-autor">{{ poema.autor || 'Autor Anónimo' }}</span>
        <h3 class="poema-titulo">{{ poema.titulo }}</h3>
        <p class="poema-estrofa">{{ poema.contenido }}</p>
      </div>

      <div class="card-actions">
        <ion-button fill="clear" color="primary" (click)="editarPoema(poema)">
          <ion-icon slot="icon-only" name="create-outline"></ion-icon>
        </ion-button>
        <ion-button fill="clear" color="danger" (click)="eliminarPoema(poema.id)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-button>
      </div>
    </div>
    } @empty {
    <div class="empty-state">
      <ion-icon name="book-outline"></ion-icon>
      <p>Aún no has escrito ningún poema. ¡Empieza a inspirarte!</p>
    </div>
    }
  </div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button class="fab-custom" routerLink="/videojuego-form">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
